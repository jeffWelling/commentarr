name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # ffmpeg/ffprobe are runtime deps of the importer's classifier
      # path. One test (TestPipelineClassifier_RejectsMissingFile) skips
      # without them; install for full coverage.
      - name: install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: vet
        run: go vet ./...

      - name: test
        run: go test -race -count=1 ./...

      - name: build
        run: go build ./cmd/commentarr

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run build

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: latest
      - name: lint
        # auth.adminPassword is required when auth.existingSecret is empty;
        # set a dummy value so the chart's required() check passes in CI.
        run: helm lint deploy/helm/commentarr --set auth.adminPassword=ci-test
      - name: render
        run: helm template ci-test deploy/helm/commentarr --set auth.adminPassword=ci-test --set ingress.enabled=true --set metrics.serviceMonitor.enabled=true > /tmp/render.yaml
      - name: render with connection bootstrap
        run: helm template ci-test deploy/helm/commentarr --set auth.adminPassword=ci-test --set connections.prowlarr.baseURL=http://p:9696 --set connections.qbittorrent.baseURL=http://q:8080 > /tmp/render-conn.yaml
