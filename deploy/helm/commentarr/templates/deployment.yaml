apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "commentarr.fullname" . }}
  labels:
    {{- include "commentarr.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "commentarr.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "commentarr.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: commentarr
          image: {{ include "commentarr.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - serve
            - -addr
            - :7878
            - -db
            - /data/commentarr.db
            - -migrations
            - /migrations
            {{- with .Values.localBypassCIDR }}
            - -local-bypass-cidr
            - {{ . | quote }}
            {{- end }}
            {{- with .Values.connections.prowlarr.baseURL }}
            - -prowlarr-url
            - {{ . | quote }}
            - -prowlarr-name
            - {{ $.Values.connections.prowlarr.name | default "prowlarr" | quote }}
            {{- end }}
            {{- if .Values.connections.prowlarr.apiKeyExistingSecret }}
            - -prowlarr-api-key
            - $(COMMENTARR_PROWLARR_API_KEY)
            {{- end }}
            {{- with .Values.search.interval }}
            - -search-interval
            - {{ . | quote }}
            {{- end }}
            {{- with .Values.connections.qbittorrent.baseURL }}
            - -qbit-url
            - {{ . | quote }}
            - -qbit-name
            - {{ $.Values.connections.qbittorrent.name | default "qbittorrent" | quote }}
            {{- end }}
            {{- if .Values.connections.qbittorrent.credsExistingSecret }}
            - -qbit-username
            - $(COMMENTARR_QBIT_USERNAME)
            - -qbit-password
            - $(COMMENTARR_QBIT_PASSWORD)
            {{- end }}
            {{- with .Values.watcher.interval }}
            - -watch-interval
            - {{ . | quote }}
            {{- end }}
            {{- with .Values.watcher.category }}
            - -watch-category
            - {{ . | quote }}
            {{- end }}
            {{- with .Values.picker.interval }}
            - -picker-interval
            - {{ . | quote }}
            {{- end }}
            {{- with .Values.placement.mode }}
            - -placement-mode
            - {{ . | quote }}
            {{- end }}
            {{- with .Values.placement.template }}
            - -placement-template
            - {{ . | quote }}
            {{- end }}
            {{- with .Values.placement.separateRoot }}
            - -placement-separate-root
            - {{ . | quote }}
            {{- end }}
            {{- with .Values.placement.trashDir }}
            - -placement-trash-dir
            - {{ . | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: 7878
              protocol: TCP
          env:
            - name: COMMENTARR_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "commentarr.authSecretName" . }}
                  key: admin-username
            - name: COMMENTARR_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "commentarr.authSecretName" . }}
                  key: admin-password
            {{- if .Values.connections.prowlarr.apiKeyExistingSecret }}
            - name: COMMENTARR_PROWLARR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.connections.prowlarr.apiKeyExistingSecret }}
                  key: {{ .Values.connections.prowlarr.apiKeySecretKey | default "api-key" }}
            {{- end }}
            {{- if .Values.connections.qbittorrent.credsExistingSecret }}
            - name: COMMENTARR_QBIT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.connections.qbittorrent.credsExistingSecret }}
                  key: {{ .Values.connections.qbittorrent.usernameSecretKey | default "username" }}
            - name: COMMENTARR_QBIT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.connections.qbittorrent.credsExistingSecret }}
                  key: {{ .Values.connections.qbittorrent.passwordSecretKey | default "password" }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
            {{- if .Values.mediaLibrary.enabled }}
            - name: media
              mountPath: {{ .Values.mediaLibrary.mountPath }}
            {{- end }}
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "commentarr.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
        {{- if .Values.mediaLibrary.enabled }}
        - name: media
          {{- if eq .Values.mediaLibrary.type "pvc" }}
          persistentVolumeClaim:
            claimName: {{ .Values.mediaLibrary.existingClaim }}
          {{- else if eq .Values.mediaLibrary.type "hostPath" }}
          hostPath:
            path: {{ .Values.mediaLibrary.hostPath }}
            type: Directory
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
