apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "commentarr.fullname" . }}
  labels:
    {{- include "commentarr.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "commentarr.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "commentarr.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: commentarr
          image: {{ include "commentarr.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["serve"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: COMMENTARR_DATA_DIR
              value: /data
            - name: COMMENTARR_LIBRARY_MODE
              value: {{ .Values.library.mode | quote }}
            - name: COMMENTARR_LIBRARY_ROOT
              value: {{ .Values.library.rootPath | quote }}
            - name: COMMENTARR_PLACEMENT_MODE
              value: {{ .Values.placement.mode | quote }}
            - name: COMMENTARR_PLACEMENT_SEPARATE_ROOT
              value: {{ .Values.placement.separateLibraryRoot | quote }}
            - name: COMMENTARR_TRASH_AUTOPURGE_DAYS
              value: {{ .Values.trash.autoPurgeDays | quote }}
            - name: COMMENTARR_TRASH_ENABLED
              value: {{ .Values.trash.enabled | quote }}
            - name: COMMENTARR_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "commentarr.authSecretName" . }}
                  key: admin-username
            - name: COMMENTARR_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "commentarr.authSecretName" . }}
                  key: admin-password
            - name: COMMENTARR_PLEX_BASE_URL
              value: {{ .Values.connections.plex.baseURL | quote }}
            - name: COMMENTARR_PLEX_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "commentarr.connectionsSecretName" . }}
                  key: plex-token
                  optional: true
            - name: COMMENTARR_JELLYFIN_BASE_URL
              value: {{ .Values.connections.jellyfin.baseURL | quote }}
            - name: COMMENTARR_JELLYFIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "commentarr.connectionsSecretName" . }}
                  key: jellyfin-api-key
                  optional: true
            - name: COMMENTARR_PROWLARR_BASE_URL
              value: {{ .Values.connections.prowlarr.baseURL | quote }}
            - name: COMMENTARR_PROWLARR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "commentarr.connectionsSecretName" . }}
                  key: prowlarr-api-key
                  optional: true
            - name: COMMENTARR_DOWNLOAD_CLIENT_TYPE
              value: {{ .Values.connections.downloadClient.type | quote }}
            - name: COMMENTARR_DOWNLOAD_CLIENT_BASE_URL
              value: {{ .Values.connections.downloadClient.baseURL | quote }}
            - name: COMMENTARR_DOWNLOAD_CLIENT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "commentarr.connectionsSecretName" . }}
                  key: download-client-username
                  optional: true
            - name: COMMENTARR_DOWNLOAD_CLIENT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "commentarr.connectionsSecretName" . }}
                  key: download-client-password
                  optional: true
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
            {{- if .Values.mediaLibrary.enabled }}
            - name: media
              mountPath: {{ .Values.mediaLibrary.mountPath }}
            {{- end }}
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "commentarr.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
        {{- if .Values.mediaLibrary.enabled }}
        - name: media
          {{- if eq .Values.mediaLibrary.type "pvc" }}
          persistentVolumeClaim:
            claimName: {{ .Values.mediaLibrary.existingClaim }}
          {{- else if eq .Values.mediaLibrary.type "hostPath" }}
          hostPath:
            path: {{ .Values.mediaLibrary.hostPath }}
            type: Directory
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
