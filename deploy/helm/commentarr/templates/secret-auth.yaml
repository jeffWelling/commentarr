{{- if not .Values.auth.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "commentarr.authSecretName" . }}
  labels:
    {{- include "commentarr.labels" . | nindent 4 }}
type: Opaque
stringData:
  admin-username: {{ .Values.auth.adminUsername | quote }}
  admin-password: {{ required "auth.adminPassword is required when auth.existingSecret is not set" .Values.auth.adminPassword | quote }}
{{- end }}
