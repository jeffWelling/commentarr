# Default values for Commentarr.
# This chart deploys a single-replica stateful service with a persistent
# volume for the SQLite database. Commentarr is designed to run as one
# process — don't scale the replica count.
#
# Connections to Plex / Jellyfin / Prowlarr / download clients are
# configured *at runtime* through the UI or REST API. See
# docs/CONFIGURATION.md. The chart only bootstraps the admin account
# and the process-level flags (listen addr, DB path, CIDR bypass).

image:
  repository: ghcr.io/jeffwelling/commentarr
  tag: ""  # defaults to .Chart.AppVersion if empty
  pullPolicy: IfNotPresent

imagePullSecrets: []

# Admin credentials. Either set inline (dev/test only) or reference an
# existing secret with keys: admin-username, admin-password.
auth:
  adminUsername: "admin"
  adminPassword: ""        # generate one and paste here, or use existingSecret
  existingSecret: ""       # takes precedence over adminPassword

# CIDR range that bypasses API-key auth (e.g. "10.0.0.0/8" for a LAN
# deployment). Evaluated against the direct socket peer, not
# X-Forwarded-For — only use on trusted networks.
localBypassCIDR: ""

# Connection hints shown in the UI. Setting baseURL on either of these
# makes it appear in /api/v1/indexers or /api/v1/download-clients
# respectively. Credentials still live at runtime (created via the UI
# after first login); this is purely the read-only connection card.
connections:
  prowlarr:
    baseURL: ""
    name: prowlarr
    # Reference an existing secret holding the Prowlarr API key — required
    # to actually run searches (just the baseURL only surfaces the card).
    # Default secret key is "api-key"; override with apiKeySecretKey.
    apiKeyExistingSecret: ""
    apiKeySecretKey: api-key
  qbittorrent:
    baseURL: ""
    name: qbittorrent

# Search loop. Set search.interval=0 (or leave Prowlarr unconfigured) to
# disable the in-process search loop and run `commentarr search` from
# cron instead.
search:
  interval: 15m

service:
  type: ClusterIP
  port: 7878

ingress:
  enabled: false
  className: ""
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt
    # nginx.ingress.kubernetes.io/proxy-body-size: "0"
  hosts:
    - host: commentarr.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
    # - secretName: commentarr-tls
    #   hosts:
    #     - commentarr.local

persistence:
  enabled: true
  storageClass: ""  # "" picks cluster default
  accessMode: ReadWriteOnce
  size: 2Gi
  # Mount path is fixed to /data; the SQLite DB lives at /data/commentarr.db.

# Volume mount for your existing media library. Defaults to an emptyDir
# — override with a PVC or hostPath. Use ReadWriteMany when multiple
# services share the volume.
mediaLibrary:
  enabled: true
  type: emptyDir          # one of: pvc, hostPath, emptyDir
  existingClaim: ""       # when type=pvc
  hostPath: ""            # when type=hostPath
  mountPath: /media

resources:
  requests:
    cpu: 10m
    memory: 128Mi
  limits:
    memory: 512Mi

podSecurityContext:
  fsGroup: 65532
  runAsNonRoot: true
  runAsUser: 65532

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
  readOnlyRootFilesystem: true

# Prometheus integration. The /metrics endpoint is always exposed; this
# block only controls whether a ServiceMonitor is rendered.
metrics:
  serviceMonitor:
    enabled: false
    interval: 30s
    namespace: ""  # same as release by default

nodeSelector: {}
tolerations: []
affinity: {}

# Extra env vars (passed verbatim into the pod).
extraEnv: []
  # - name: COMMENTARR_LOG_LEVEL
  #   value: "debug"
